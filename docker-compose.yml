services:
  db:
    image: postgres:16
    container_name: fitness_db
    environment:
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: REDACTED
      POSTGRES_DB: fitness
    ports:
      - "5432:5432"
    volumes:
      - fitness_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness -d fitness"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: fitness.api/fitness.api/Dockerfile
    container_name: fitness_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=fitness;Username=fitness;Password=REDACTED
    ports:
      - "8080:8080"

volumes:
  fitness_db_data: